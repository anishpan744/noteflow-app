name: noteflow_app
description: "NoteFlow & TaskCanvas — Think clearly. Act precisely."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  firebase_storage: ^12.0.0
  firebase_analytics: ^11.0.0
  firebase_crashlytics: ^4.0.0
  firebase_messaging: ^15.0.0

  # Auth
  google_sign_in: ^6.2.0

  # State management
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.0

  # Navigation
  go_router: ^14.0.0

  # Local database
  drift: ^2.18.0
  drift_flutter: ^0.1.0
  sqlite3_flutter_libs: ^0.5.0

  # Rich text editor
  flutter_quill: ^9.2.3

  # Calendar
  table_calendar: ^3.1.0

  # Notifications
  flutter_local_notifications: ^17.0.0

  # File handling
  file_picker: ^8.0.0
  image_picker: ^1.1.0

  # Security
  flutter_secure_storage: ^9.0.0
  local_auth: ^2.3.0

  # UI & Design
  google_fonts: ^6.2.0
  phosphor_flutter: ^2.1.0
  flutter_colorpicker: ^1.1.0
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  lottie: ^3.1.0
  fl_chart: ^0.67.0

  # Connectivity & utils
  shared_preferences: ^2.3.0
  connectivity_plus: ^6.0.0
  uuid: ^4.4.0
  url_launcher: ^6.3.0
  share_plus: ^9.0.0
  path_provider: ^2.1.0
  path: ^1.9.0

  # Code generation annotations
  freezed_annotation: ^2.4.0
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.0
  freezed: ^2.5.0
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0
  drift_dev: ^2.18.0
  flutter_launcher_icons: ^0.13.0
  flutter_native_splash: ^2.4.0

flutter_launcher_icons:
  android: true
  ios: false
  windows:
    generate: true
    image_path: "assets/icon/app_icon.png"
    icon_size: 48
  image_path: "assets/icon/app_icon.png"

flutter_native_splash:
  color: "#050810"
  image: assets/splash/logo_animated.png
  android: true
  windows: false

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
    - assets/splash/
    - assets/lottie/
    - assets/fonts/
